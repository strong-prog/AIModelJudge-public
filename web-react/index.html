<!DOCTYPE html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#111111" />
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Prevent FOUC — apply saved theme before React mounts
      (function() {
        var t = localStorage.getItem('amj-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        var c = localStorage.getItem('amj-comfort');
        if (c === 'true') document.documentElement.setAttribute('data-comfort', 'true');
      })();
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>" />
    <title>AIModelJudge</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && location.port !== '5173') {
        navigator.serviceWorker.register('/app/sw.js').catch(function() {});
      }
    </script>
  </body>
</html>
