name: Security Scan

on:
  schedule:
    - cron: "37 6 * * 1"  # каждый понедельник 6:37am UTC
  push:
    branches: [master]
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "Dockerfile"
      - "docker-compose.yml"
  workflow_dispatch:  # ручной запуск

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tools
        run: pip install pip-audit cyclonedx-py
      - name: Run pip-audit
        run: pip-audit --requirement pyproject.toml
        continue-on-error: true  # не блокирует CI, только предупреждает

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aimodeljudge:latest .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: aimodeljudge:latest
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
        continue-on-error: true

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate SBOM
        run: |
          pip install cyclonedx-py
          cyclonedx-py requirements pyproject.toml -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
