# AIModelJudge — Nginx reverse proxy с TLS 1.3
# Установка: bash deploy/setup-tls.sh
# Путь: /etc/nginx/sites-available/aimodeljudge

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ── HTTPS / TLS 1.3 ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name example.com;

    # ── TLS 1.3 only, strong ciphers ──
    ssl_protocols TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Certbot-managed certificates
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

    # SSL Labs A+ grade
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ── Proxy to AIModelJudge :9651 ──
    location / {
        proxy_pass http://127.0.0.1:9651;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты для долгих SSE-стримов
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Выключить буферизацию для SSE
        proxy_buffering off;
        proxy_cache off;

        # Лимиты на тело запроса
        client_max_body_size 10m;
    }

    # ── WebSocket для hermes-local-agent ──
    location /agent/ws {
        proxy_pass http://127.0.0.1:9651;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h для долгоживущих WS-соединений
    }

    # ── Rate limiting (DDoS protection) ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    location /chat {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:9651;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }
}
